<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Korea Trip Map</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  ></script>

  <style>
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    header {
      padding: 12px;
      border-bottom: 1px solid #eee;
      position: sticky; top: 0; background: white; z-index: 1000;
    }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    input[type="search"] {
      flex: 1; min-width: 220px;
      padding: 10px 12px; border: 1px solid #ddd; border-radius: 10px;
      font-size: 16px;
    }
    button {
      padding: 10px 12px; border: 1px solid #ddd; background: #fafafa;
      border-radius: 10px; font-size: 16px; cursor: pointer;
    }
    button.primary { border-color: #cfcfcf; background: #f1f1f1; }
    button.active { background: #111; color: #fff; border-color: #111; }

    #tabBar { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }

    #results {
      margin-top: 10px; max-height: 240px; overflow: auto;
      border: 1px solid #eee; border-radius: 10px; padding: 6px;
      display: block;
    }
    .item { padding: 10px; border-radius: 10px; cursor: pointer; }
    .item:hover { background: #f4f4f4; }

    .meta { color: #666; font-size: 13px; margin-top: 2px; }
    .pill {
      display:inline-block; padding:2px 8px; border:1px solid #ddd;
      border-radius: 999px; font-size:12px; margin-left:6px; color:#444;
      background: #fff;
    }

    #map { height: calc(100vh - 185px); }

    .emoji-marker {
      width: 32px; height: 32px;
      display: grid; place-items: center;
      border-radius: 999px;
      border: 2px solid rgba(0,0,0,0.12);
      box-shadow: 0 1px 6px rgba(0,0,0,0.12);
      font-size: 18px;
    }
  </style>
</head>

<body>
  <header>
    <div class="row">
      <input id="q" type="search" placeholder="Search places..." />
      <button id="clearBtn">Clear</button>
    </div>
    <div id="tabBar"></div>
    <div id="results"></div>
  </header>

  <div id="map"></div>

<script>
const map = L.map("map").setView([37.5665, 126.9780], 12);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19,
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

const DAYS = ["Day 1","Day 2","Day 3","Day 4"];
let activeDay = "Day 1";

const PINK = "#ff7bbd";
const PURPLE = "#8a5cff";

const CAT_ICON = {
  "Airport":"✈️",
  "Stay":"🏠",
  "Cafe":"☕️",
  "Food":"🍜",
  "Sight":"🏛️",
  "Nature":"🌸",
  "Shopping":"🛍️",
  "Clinic":"🏥",
  "Concert":"🎤",
  "Animal Cafe":"🐾",
  "Other":"📍"
};

let allPoints = [];
let markerById = new Map();
let dayMarkerIds = new Set();

function googleMapsLink(lat,lng){
  return `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`;
}

function kakaoMapLink(lat,lng,name){
  return `https://map.kakao.com/link/map/${encodeURIComponent(name)},${lat},${lng}`;
}

/* NEW — NAVER MAP LINK */
function naverMapLink(lat,lng,name){
  return `https://map.naver.com/v5/search/${encodeURIComponent(name)}/place?c=${lng},${lat},15,0,0,0,dh`;
}

function iconEmoji(emoji,color){
  return L.divIcon({
    className:"",
    html:`<div class="emoji-marker" style="background:${color};">${emoji}</div>`,
    iconSize:[32,32],
    iconAnchor:[16,32]
  });
}

function markerColor(p){
  return p.who==="me"?PURPLE:PINK;
}

function clearDayMarkers(){
  for(const id of dayMarkerIds){
    const m=markerById.get(id);
    if(m){map.removeLayer(m);markerById.delete(id);}
  }
  dayMarkerIds.clear();
}

async function createMarker(p){
  if(markerById.has(p.id)) return markerById.get(p.id);

  if(!p.lat||!p.lng) return;

  const emoji = CAT_ICON[p.category]||"📍";
  const marker=L.marker([p.lat,p.lng],{
    icon:iconEmoji(emoji,markerColor(p))
  }).addTo(map);

  const g=googleMapsLink(p.lat,p.lng);
  const k=kakaoMapLink(p.lat,p.lng,p.name);
  const n=naverMapLink(p.lat,p.lng,p.name);

  marker.bindPopup(`
    <strong>${p.name}</strong><br>
    ${p.notes||""}<br><br>
    <a href="${g}" target="_blank">Google</a> |
    <a href="${k}" target="_blank">Kakao</a> |
    <a href="${n}" target="_blank">Naver</a>
  `);

  markerById.set(p.id,marker);
  return marker;
}

function getDayPoints(day){
  return allPoints.filter(p=>p.day===day);
}

async function switchDay(){
  clearDayMarkers();
  const pts=getDayPoints(activeDay);
  renderList(pts);
  for(const p of pts){
    const m=await createMarker(p);
    if(m) dayMarkerIds.add(p.id);
  }
}

function renderTabs(){
  const el=document.getElementById("tabBar");
  el.innerHTML=DAYS.map(d=>
    `<button class="${d===activeDay?"active":""}" data-day="${d}">${d}</button>`
  ).join("");

  el.querySelectorAll("button").forEach(btn=>{
    btn.onclick=async()=>{
      activeDay=btn.dataset.day;
      renderTabs();
      await switchDay();
    };
  });
}

function renderList(points){
  const el=document.getElementById("results");
  el.innerHTML=points.map(p=>
    `<div class="item" data-id="${p.id}">
      <strong>${p.name}</strong>
      <div class="meta">${p.notes||""}</div>
    </div>`
  ).join("");

  el.querySelectorAll(".item").forEach(div=>{
    div.onclick=()=>{
      const p=points.find(x=>x.id===div.dataset.id);
      if(!p||!p.lat||!p.lng) return;
      map.setView([p.lat,p.lng],16);
      markerById.get(p.id)?.openPopup();
    };
  });
}

document.getElementById("clearBtn").onclick=()=>{
  document.getElementById("q").value="";
  renderList(getDayPoints(activeDay));
};

fetch("./points.json")
.then(r=>r.json())
.then(async data=>{
  allPoints=data.map(p=>({
    ...p,
    lat:p.lat,
    lng:p.lng??p.long   // supports both
  }));
  renderTabs();
  await switchDay();
});
</script>
</body>
</html>
