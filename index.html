<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Korea Trip Map</title>

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <style>
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    header {
      padding: 12px;
      border-bottom: 1px solid #eee;
      position: sticky; top: 0; background: white; z-index: 1000;
    }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    input[type="search"] {
      flex: 1; min-width: 220px;
      padding: 10px 12px; border: 1px solid #ddd; border-radius: 10px;
      font-size: 16px;
    }
    button {
      padding: 10px 12px; border: 1px solid #ddd; background: #fafafa;
      border-radius: 10px; font-size: 16px; cursor: pointer;
    }
    button.primary { border-color: #cfcfcf; background: #f1f1f1; }
    button.active { background: #111; color: #fff; border-color: #111; }
    #dayBar { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
    #results {
      margin-top: 10px; max-height: 200px; overflow: auto;
      border: 1px solid #eee; border-radius: 10px; padding: 6px; display: none;
    }
    .item { padding: 10px; border-radius: 10px; cursor: pointer; }
    .item:hover { background: #f4f4f4; }
    .meta { color: #666; font-size: 13px; margin-top: 2px; }
    .pill { display:inline-block; padding:2px 8px; border:1px solid #ddd; border-radius: 999px; font-size:12px; margin-left:6px; color:#444;}
    #map { height: calc(100vh - 150px); }

    /* Emoji marker bubble */
    .emoji-marker {
      width: 30px; height: 30px;
      display: grid; place-items: center;
      border-radius: 999px;
      border: 1px solid #ddd;
      background: white;
      box-shadow: 0 1px 6px rgba(0,0,0,0.12);
      font-size: 18px;
    }
  </style>
</head>

<body>
  <header>
    <div class="row">
      <input id="q" type="search" placeholder="Search your saved places (name / notes / category)..." />
      <button id="nearBtn" class="primary" title="Use GPS to show distances">Near me</button>
      <button id="clearBtn" title="Clear filters & search">Clear</button>
    </div>

    <div id="dayBar"></div>
    <div id="results"></div>
  </header>

  <div id="map"></div>

  <script>
    // -----------------------------
    // Helpers
    // -----------------------------
    function escapeHtml(str) {
      return String(str ?? "").replace(/[&<>"']/g, s => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
      }[s]));
    }

    function haversineKm(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a =
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
        Math.sin(dLon/2) * Math.sin(dLon/2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }

    function googleMapsLink(lat, lng) {
      return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(lat + "," + lng)}`;
    }

    function kakaoMapLink(lat, lng, name) {
      // KakaoMap deep link style
      return `https://map.kakao.com/link/map/${encodeURIComponent(name || "Pinned Place")},${lat},${lng}`;
    }

    // Category -> emoji (easy + free, works everywhere)
    const CAT_ICON = {
      "Cafe": "☕️",
      "Food": "🍜",
      "Sight": "🏛️",
      "Nature": "🌸",
      "Shopping": "🛍️",
      "Hotel": "🛏️",
      "Transport": "🚆",
      "Other": "📍"
    };

    function iconForCategory(cat) {
      const emoji = CAT_ICON[cat] || CAT_ICON["Other"];
      return L.divIcon({
        className: "",
        html: `<div class="emoji-marker">${emoji}</div>`,
        iconSize: [30, 30],
        iconAnchor: [15, 30],
        popupAnchor: [0, -28]
      });
    }

    // -----------------------------
    // Map init
    // -----------------------------
    const map = L.map("map", { zoomControl: true }).setView([37.5665, 126.9780], 12);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // -----------------------------
    // State
    // -----------------------------
    let allPoints = [];
    let filteredPoints = [];
    let markers = []; // { point, marker }
    let activeDay = "All";
    let userLocation = null; // {lat, lng}
    let userMarker = null;

    const resultsEl = document.getElementById("results");
    const dayBarEl = document.getElementById("dayBar");
    const qEl = document.getElementById("q");

    // -----------------------------
    // Rendering
    // -----------------------------
    function buildPopup(point) {
      const name = escapeHtml(point.name || "Unnamed");
      const day = escapeHtml(point.day || "Unassigned");
      const cat = escapeHtml(point.category || "Other");
      const notes = point.notes ? `<div class="meta">${escapeHtml(point.notes)}</div>` : "";

      let distLine = "";
      if (userLocation) {
        const km = haversineKm(userLocation.lat, userLocation.lng, point.lat, point.lng);
        distLine = `<div class="meta">Distance: <strong>${km.toFixed(2)} km</strong></div>`;
      }

      const g = googleMapsLink(point.lat, point.lng);
      const k = kakaoMapLink(point.lat, point.lng, point.name);

      return `
        <div>
          <div><strong>${name}</strong><span class="pill">${cat}</span><span class="pill">${day}</span></div>
          ${notes}
          ${distLine}
          <div style="margin-top:8px;">
            <a href="${g}" target="_blank" rel="noopener">Open in Google Maps</a>
            &nbsp;|&nbsp;
            <a href="${k}" target="_blank" rel="noopener">Open in KakaoMap</a>
          </div>
        </div>
      `;
    }

    function clearMarkers() {
      markers.forEach(m => map.removeLayer(m.marker));
      markers = [];
    }

    function addMarkers(points) {
      clearMarkers();
      points.forEach(p => {
        const marker = L.marker([p.lat, p.lng], { icon: iconForCategory(p.category) }).addTo(map);
        marker.bindPopup(buildPopup(p));
        markers.push({ point: p, marker });
      });
    }

    function fitTo(points) {
      if (!points.length) return;
      const bounds = L.latLngBounds(points.map(p => [p.lat, p.lng]));
      map.fitBounds(bounds.pad(0.15));
    }

    function renderDayButtons() {
      const days = Array.from(new Set(allPoints.map(p => p.day || "Unassigned"))).sort((a,b) => a.localeCompare(b));
      const full = ["All", ...days];

      dayBarEl.innerHTML = full.map(d => `
        <button class="${d === activeDay ? "active" : ""}" data-day="${escapeHtml(d)}">${escapeHtml(d)}</button>
      `).join("");

      dayBarEl.querySelectorAll("button").forEach(btn => {
        btn.addEventListener("click", () => {
          activeDay = btn.getAttribute("data-day");
          applyFilters();
          renderDayButtons();
        });
      });
    }

    function showResults(list) {
      if (!qEl.value.trim() && activeDay === "All" && !userLocation) {
        resultsEl.style.display = "none";
        resultsEl.innerHTML = "";
        return;
      }

      resultsEl.style.display = "block";

      if (!list.length) {
        resultsEl.innerHTML = `<div class="item"><strong>No matches</strong><div class="meta">Try a different keyword or day.</div></div>`;
        return;
      }

      // If near-me is active, sort by distance
      let sorted = list.slice();
      if (userLocation) {
        sorted.sort((a,b) => {
          const da = haversineKm(userLocation.lat, userLocation.lng, a.lat, a.lng);
          const db = haversineKm(userLocation.lat, userLocation.lng, b.lat, b.lng);
          return da - db;
        });
      }

      resultsEl.innerHTML = sorted.map(p => {
        const name = escapeHtml(p.name || "Unnamed");
        const cat = escapeHtml(p.category || "Other");
        const day = escapeHtml(p.day || "Unassigned");
        let dist = "";
        if (userLocation) {
          const km = haversineKm(userLocation.lat, userLocation.lng, p.lat, p.lng);
          dist = `<span class="pill">${km.toFixed(2)} km</span>`;
        }
        return `
          <div class="item" data-name="${name}">
            <strong>${name}</strong>
            <span class="pill">${cat}</span>
            <span class="pill">${day}</span>
            ${dist}
            <div class="meta">${escapeHtml((p.notes || "").slice(0, 80))}</div>
          </div>
        `;
      }).join("");

      resultsEl.querySelectorAll(".item").forEach(el => {
        el.addEventListener("click", () => {
          const name = el.getAttribute("data-name");
          const point = sorted.find(x => (x.name || "Unnamed") === name) || sorted[0];
          map.setView([point.lat, point.lng], 16, { animate: true });
          const m = markers.find(mm => mm.point === point);
          if (m) m.marker.openPopup();
        });
      });
    }

    function searchWithin(points, query) {
      const q = query.trim().toLowerCase();
      if (!q) return points;
      return points.filter(p => {
        const hay = `${p.name ?? ""} ${p.category ?? ""} ${p.notes ?? ""} ${p.day ?? ""}`.toLowerCase();
        return hay.includes(q);
      });
    }

    function applyFilters() {
      // Day filter
      let base = allPoints.slice();
      if (activeDay !== "All") {
        base = base.filter(p => (p.day || "Unassigned") === activeDay);
      }

      // Search filter
      const q = qEl.value;
      filteredPoints = searchWithin(base, q);

      addMarkers(filteredPoints);

      // Fit logic: if user location exists, keep current view; otherwise fit
      if (!userLocation) {
        fitTo(filteredPoints.length ? filteredPoints : base.length ? base : allPoints);
      }

      showResults(filteredPoints);
    }

    function refreshPopups() {
      // rebuild popups to include distances after Near Me
      markers.forEach(m => m.marker.setPopupContent(buildPopup(m.point)));
    }

    // -----------------------------
    // Near me (GPS)
    // -----------------------------
    async function activateNearMe() {
      if (!navigator.geolocation) {
        alert("Your browser doesn’t support GPS location.");
        return;
      }

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };

          // show user marker
          if (userMarker) map.removeLayer(userMarker);
          userMarker = L.circleMarker([userLocation.lat, userLocation.lng], {
            radius: 8,
            weight: 2
          }).addTo(map).bindPopup("<strong>You are here</strong>");

          // refresh distances in results + popups
          refreshPopups();
          applyFilters();

          // optionally center to user
          map.setView([userLocation.lat, userLocation.lng], 14, { animate: true });
        },
        (err) => {
          alert("Could not get your location. Please allow location permission in your browser settings.");
          console.error(err);
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    }

    // -----------------------------
    // UI wiring
    // -----------------------------
    document.getElementById("nearBtn").addEventListener("click", activateNearMe);

    document.getElementById("clearBtn").addEventListener("click", () => {
      qEl.value = "";
      activeDay = "All";
      userLocation = null;
      if (userMarker) { map.removeLayer(userMarker); userMarker = null; }
      renderDayButtons();
      applyFilters();
      qEl.focus();
    });

    qEl.addEventListener("input", applyFilters);

    // -----------------------------
    // Load points
    // -----------------------------
    fetch("./points.json")
      .then(r => r.json())
      .then(points => {
        allPoints = points
          .filter(p => typeof p.lat === "number" && typeof p.lng === "number")
          .map(p => ({
            name: p.name ?? "Unnamed",
            day: p.day ?? "Unassigned",
            category: p.category ?? "Other",
            notes: p.notes ?? "",
            lat: p.lat,
            lng: p.lng
          }));

        renderDayButtons();
        applyFilters();
        if (allPoints.length) fitTo(allPoints);
      })
      .catch(err => {
        alert("Could not load points.json. Check the file name and JSON format.");
        console.error(err);
      });
  </script>
</body>
</html>
