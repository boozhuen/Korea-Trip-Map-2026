<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Korea Trip Map</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <style>
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    header {
      padding: 12px;
      border-bottom: 1px solid #eee;
      position: sticky; top: 0; background: white; z-index: 1000;
    }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    input[type="search"] {
      flex: 1; min-width: 220px;
      padding: 10px 12px; border: 1px solid #ddd; border-radius: 10px;
      font-size: 16px;
    }
    button {
      padding: 10px 12px; border: 1px solid #ddd; background: #fafafa;
      border-radius: 10px; font-size: 16px; cursor: pointer;
    }
    button.primary { border-color: #cfcfcf; background: #f1f1f1; }
    button.active { background: #111; color: #fff; border-color: #111; }

    #tabBar { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }

    #results {
      margin-top: 10px; max-height: 240px; overflow: auto;
      border: 1px solid #eee; border-radius: 10px; padding: 6px;
      display: block;
    }
    .item { padding: 10px; border-radius: 10px; cursor: pointer; }
    .item:hover { background: #f4f4f4; }

    .meta { color: #666; font-size: 13px; margin-top: 2px; }
    .pill {
      display:inline-block; padding:2px 8px; border:1px solid #ddd;
      border-radius: 999px; font-size:12px; margin-left:6px; color:#444;
      background: #fff;
    }
    .hint { color:#666; font-size:13px; margin-top:8px; }

    #map { height: calc(100vh - 185px); }

    .emoji-marker {
      width: 32px; height: 32px;
      display: grid; place-items: center;
      border-radius: 999px;
      border: 2px solid rgba(0,0,0,0.12);
      box-shadow: 0 1px 6px rgba(0,0,0,0.12);
      font-size: 18px;
    }

    .status {
      margin-top: 8px;
      color: #666;
      font-size: 13px;
    }
  </style>
</head>

<body>
  <header>
    <div class="row">
      <input id="q" type="search" placeholder="Search places (name / notes / category)..." />
      <button id="nearBtn" class="primary">Near me</button>
      <button id="clearBtn">Clear</button>
    </div>

    <div id="tabBar"></div>
    <div class="hint">Tap a place in the list to zoom to it. All places for the selected day will be pinned automatically.</div>
    <div id="status" class="status"></div>
    <div id="results"></div>
  </header>

  <div id="map"></div>

<script>
// ============================
// ORIGINAL LOGIC RESTORED
// ============================

const map = L.map("map", { zoomControl: true }).setView([37.5665, 126.9780], 12);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19,
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

const DAYS = ["Day 1", "Day 2", "Day 3", "Day 4"];
let activeDay = "Day 1";

const PINK   = "#ff7bbd";
const PURPLE = "#8a5cff";

const CAT_ICON = {
  "Airport": "✈️",
  "Stay": "🏠",
  "Cafe": "☕️",
  "Food": "🍜",
  "Sight": "🏛️",
  "Nature": "🌸",
  "Shopping": "🛍️",
  "Clinic": "🏥",
  "Concert": "🎤",
  "Other": "📍"
};

let allPoints = [];
let overlapKeys = new Set();
let userLocation = null;
let userMarker = null;

const markerById = new Map();
const dayMarkerIds = new Set();

let pinRunToken = 0;

const qEl = document.getElementById("q");
const resultsEl = document.getElementById("results");
const tabBarEl = document.getElementById("tabBar");
const statusEl = document.getElementById("status");

function setResultsVisible(isVisible) {
  resultsEl.style.display = isVisible ? "block" : "none";
}

function setStatus(msg) {
  statusEl.textContent = msg || "";
}

function googleMapsLink(lat, lng) {
  return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(lat + "," + lng)}`;
}

function kakaoMapLink(lat, lng, name) {
  return `https://map.kakao.com/link/map/${encodeURIComponent(name || "Pinned Place")},${lat},${lng}`;
}

/* ✅ ONLY NEW ADDITION */
function naverMapLink(lat, lng, name) {
  return `https://map.naver.com/v5/search/${encodeURIComponent(name || "Pinned Place")}/place?c=${lng},${lat},15,0,0,0,dh`;
}

// ============================
// POPUP (only addition = Naver link)
// ============================

function buildPopup(p, coords) {

  const g = googleMapsLink(coords.lat, coords.lng);
  const k = kakaoMapLink(coords.lat, coords.lng, p.name);
  const n = naverMapLink(coords.lat, coords.lng, p.name);

  return `
    <div>
      <strong>${p.name}</strong><br>
      ${p.notes || ""}<br><br>
      <a href="${g}" target="_blank">Open in Google Maps</a>
      &nbsp;|&nbsp;
      <a href="${k}" target="_blank">Open in KakaoMap</a>
      &nbsp;|&nbsp;
      <a href="${n}" target="_blank">Open in Naver Map</a>
    </div>
  `;
}

// ============================
// Load points.json
// ============================

fetch("./points.json")
  .then(r => r.json())
  .then(async points => {

    allPoints = points.map((p, idx) => ({
      ...p,
      lat: p.lat,
      lng: p.lng ?? p.long   // supports BOTH
    }));

    renderTabs();
    await switchDayAndPin();
  });
</script>
</body>
</html>
