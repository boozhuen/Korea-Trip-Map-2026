<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Korea Trip Map</title>

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <style>
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    header {
      padding: 12px;
      border-bottom: 1px solid #eee;
      position: sticky; top: 0; background: white; z-index: 1000;
    }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    input[type="search"] {
      flex: 1; min-width: 220px;
      padding: 10px 12px; border: 1px solid #ddd; border-radius: 10px;
      font-size: 16px;
    }
    button {
      padding: 10px 12px; border: 1px solid #ddd; background: #fafafa;
      border-radius: 10px; font-size: 16px; cursor: pointer;
    }
    button.primary { border-color: #cfcfcf; background: #f1f1f1; }
    button.active { background: #111; color: #fff; border-color: #111; }

    #tabBar { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }

    #results {
      margin-top: 10px; max-height: 220px; overflow: auto;
      border: 1px solid #eee; border-radius: 10px; padding: 6px; display: none;
    }
    .item { padding: 10px; border-radius: 10px; cursor: pointer; }
    .item:hover { background: #f4f4f4; }

    .meta { color: #666; font-size: 13px; margin-top: 2px; }
    .pill {
      display:inline-block; padding:2px 8px; border:1px solid #ddd;
      border-radius: 999px; font-size:12px; margin-left:6px; color:#444;
      background: #fff;
    }
    #map { height: calc(100vh - 170px); }

    /* Emoji marker bubble */
    .emoji-marker {
      width: 32px; height: 32px;
      display: grid; place-items: center;
      border-radius: 999px;
      border: 2px solid rgba(0,0,0,0.12);
      box-shadow: 0 1px 6px rgba(0,0,0,0.12);
      font-size: 18px;
    }
  </style>
</head>

<body>
  <header>
    <div class="row">
      <input id="q" type="search" placeholder="Search places (name / notes / category)..." />
      <button id="nearBtn" class="primary">Near me</button>
      <button id="clearBtn">Clear</button>
    </div>

    <div id="tabBar"></div>
    <div id="results"></div>
  </header>

  <div id="map"></div>

  <script>
    // -----------------------------
    // Map init
    // -----------------------------
    const map = L.map("map", { zoomControl: true }).setView([37.5665, 126.9780], 12);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // -----------------------------
    // Constants / state
    // -----------------------------
    const DAYS = ["Day 1", "Day 2", "Day 3", "Day 4"];
    let activeDay = "Day 1";

    const PINK   = "#ff7bbd";  // aunt
    const PURPLE = "#8a5cff";  // you

    const CAT_ICON = {
      "Airport": "✈️",
      "Stay": "🏠",
      "Cafe": "☕️",
      "Food": "🍜",
      "Sight": "🏛️",
      "Nature": "🌸",
      "Shopping": "🛍️",
      "Clinic": "🏥",
      "Concert": "🎤",
      "Other": "📍"
    };

    let allPoints = [];
    let overlapKeys = new Set();     // day__normalizedName keys that appear in both sets
    let userLocation = null;         // {lat, lng}
    let userMarker = null;

    let markers = [];                // Leaflet markers
    let renderToken = 0;             // prevents stale async rendering

    const qEl = document.getElementById("q");
    const resultsEl = document.getElementById("results");
    const tabBarEl = document.getElementById("tabBar");

    // -----------------------------
    // Helpers
    // -----------------------------
    function escapeHtml(str) {
      return String(str ?? "").replace(/[&<>"']/g, s => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
      }[s]));
    }

    function normName(s) {
      return String(s || "").trim().toLowerCase().replace(/\s+/g, " ");
    }

    function pointKey(p) {
      return `${p.day}__${normName(p.name)}`;
    }

    function haversineKm(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a =
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
        Math.sin(dLon/2) * Math.sin(dLon/2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }

    function googleMapsLink(lat, lng) {
      return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(lat + "," + lng)}`;
    }

    function kakaoMapLink(lat, lng, name) {
      return `https://map.kakao.com/link/map/${encodeURIComponent(name || "Pinned Place")},${lat},${lng}`;
    }

    function iconEmoji(emoji, bgColor) {
      return L.divIcon({
        className: "",
        html: `<div class="emoji-marker" style="background:${bgColor};">${emoji}</div>`,
        iconSize: [32, 32],
        iconAnchor: [16, 32],
        popupAnchor: [0, -30]
      });
    }

    function markerColor(p) {
      // Overlap always pink
      if (overlapKeys.has(pointKey(p))) return PINK;
      return (p.who === "me") ? PURPLE : PINK;
    }

    function whoLabel(p) {
      if (overlapKeys.has(pointKey(p))) return "Overlap (pink)";
      return p.who === "me" ? "You (purple)" : "Aunt (pink)";
    }

    function computeOverlap(points) {
      const seen = new Map(); // key -> Set(who)
      for (const p of points) {
        const k = pointKey(p);
        if (!seen.has(k)) seen.set(k, new Set());
        seen.get(k).add(p.who);
      }
      const overlaps = new Set();
      for (const [k, s] of seen.entries()) {
        if (s.has("aunt") && s.has("me")) overlaps.add(k);
      }
      return overlaps;
    }

    // -----------------------------
    // Free geocoding (no API key)
    // Uses OpenStreetMap Nominatim.
    // Caches results in localStorage to avoid repeated calls.
    // -----------------------------
    const GEO_CACHE_KEY = "koreaTripGeoCache_v1";
    const geoCache = JSON.parse(localStorage.getItem(GEO_CACHE_KEY) || "{}");

    // Simple queue to throttle requests (1 at a time, ~1.2s delay)
    let geoQueue = Promise.resolve();

    function saveGeoCache() {
      localStorage.setItem(GEO_CACHE_KEY, JSON.stringify(geoCache));
    }

    function buildGeocodeQuery(p) {
      // Prefer full address; fallback to name + Seoul
      if (p.address && p.address.trim()) return p.address;
      return `${p.name}, Seoul, South Korea`;
    }

    async function geocodePoint(p) {
      // Already has coordinates
      if (typeof p.lat === "number" && typeof p.lng === "number") return { lat: p.lat, lng: p.lng };

      const cacheKey = buildGeocodeQuery(p);
      if (geoCache[cacheKey]) return geoCache[cacheKey];

      // Throttle via queue
      geoQueue = geoQueue.then(async () => {
        const q = buildGeocodeQuery(p);
        const url =
          "https://nominatim.openstreetmap.org/search?format=json&limit=1&q=" +
          encodeURIComponent(q);

        const resp = await fetch(url);
        if (!resp.ok) throw new Error("Geocode failed");
        const data = await resp.json();

        if (!data || !data.length) throw new Error("No geocode result");

        const lat = Number(data[0].lat);
        const lng = Number(data[0].lon);
        const coords = { lat, lng };

        geoCache[cacheKey] = coords;
        saveGeoCache();

        // polite delay
        await new Promise(r => setTimeout(r, 1200));

        return coords;
      });

      return geoQueue;
    }

    // -----------------------------
    // Rendering
    // -----------------------------
    function clearMarkers() {
      markers.forEach(m => map.removeLayer(m));
      markers = [];
    }

    function fitToMarkers() {
      if (!markers.length) return;
      const latlngs = markers.map(m => m.getLatLng());
      const bounds = L.latLngBounds(latlngs);
      map.fitBounds(bounds.pad(0.18));
    }

    function buildPopup(p, coords) {
      const name = escapeHtml(p.name);
      const day = escapeHtml(p.day);
      const cat = escapeHtml(p.category || "Other");
      const notes = p.notes ? `<div class="meta">${escapeHtml(p.notes)}</div>` : "";
      const who = `<div class="meta">${escapeHtml(whoLabel(p))}</div>`;

      let distLine = "";
      if (userLocation) {
        const km = haversineKm(userLocation.lat, userLocation.lng, coords.lat, coords.lng);
        distLine = `<div class="meta">Distance: <strong>${km.toFixed(2)} km</strong></div>`;
      }

      const g = googleMapsLink(coords.lat, coords.lng);
      const k = kakaoMapLink(coords.lat, coords.lng, p.name);

      return `
        <div>
          <div><strong>${name}</strong>
            <span class="pill">${cat}</span>
            <span class="pill">${day}</span>
          </div>
          ${who}
          ${notes}
          ${distLine}
          <div style="margin-top:8px;">
            <a href="${g}" target="_blank" rel="noopener">Open in Google Maps</a>
            &nbsp;|&nbsp;
            <a href="${k}" target="_blank" rel="noopener">Open in KakaoMap</a>
          </div>
        </div>
      `;
    }

    function renderTabs() {
      tabBarEl.innerHTML = DAYS.map(d => `
        <button class="${d === activeDay ? "active" : ""}" data-day="${d}">${d}</button>
      `).join("");

      tabBarEl.querySelectorAll("button").forEach(btn => {
        btn.addEventListener("click", () => {
          activeDay = btn.getAttribute("data-day");
          applyFilters();
          renderTabs();
        });
      });
    }

    function searchWithin(points, query) {
      const q = query.trim().toLowerCase();
      if (!q) return points;
      return points.filter(p => {
        const hay = `${p.name ?? ""} ${p.category ?? ""} ${p.notes ?? ""} ${p.address ?? ""}`.toLowerCase();
        return hay.includes(q);
      });
    }

    function showResults(list) {
      // show results panel whenever there's a day tab (always) – but keep tidy when empty
      resultsEl.style.display = "block";

      if (!list.length) {
        resultsEl.innerHTML = `<div class="item"><strong>No matches</strong><div class="meta">Try a different keyword.</div></div>`;
        return;
      }

      let sorted = list.slice();
      if (userLocation) {
        // sort by distance (if geocoded in cache, else keep order)
        sorted.sort((a, b) => {
          const qa = buildGeocodeQuery(a);
          const qb = buildGeocodeQuery(b);
          const ca = geoCache[qa];
          const cb = geoCache[qb];
          if (!ca || !cb) return 0;
          const da = haversineKm(userLocation.lat, userLocation.lng, ca.lat, ca.lng);
          const db = haversineKm(userLocation.lat, userLocation.lng, cb.lat, cb.lng);
          return da - db;
        });
      }

      resultsEl.innerHTML = sorted.map(p => {
        const cat = escapeHtml(p.category || "Other");
        const emoji = CAT_ICON[p.category] || CAT_ICON["Other"];
        const label = escapeHtml(whoLabel(p));
        let dist = "";

        if (userLocation) {
          const q = buildGeocodeQuery(p);
          const c = geoCache[q];
          if (c) {
            const km = haversineKm(userLocation.lat, userLocation.lng, c.lat, c.lng);
            dist = `<span class="pill">${km.toFixed(2)} km</span>`;
          }
        }

        return `
          <div class="item" data-id="${escapeHtml(p.id)}">
            <strong>${escapeHtml(p.name)}</strong>
            <span class="pill">${emoji} ${cat}</span>
            <span class="pill">${label}</span>
            ${dist}
            <div class="meta">${escapeHtml((p.notes || p.address || "").slice(0, 90))}</div>
          </div>
        `;
      }).join("");

      resultsEl.querySelectorAll(".item").forEach(el => {
        el.addEventListener("click", async () => {
          const id = el.getAttribute("data-id");
          const p = list.find(x => x.id === id);
          if (!p) return;

          try {
            const coords = await geocodePoint(p);
            map.setView([coords.lat, coords.lng], 16, { animate: true });

            // Try to open popup if marker exists
            const mk = markers.find(m => m.options && m.options.__pointId === p.id);
            if (mk) mk.openPopup();
          } catch {
            alert("Could not find this place on the map yet. Try again later or refine the address in points.json.");
          }
        });
      });
    }

    function dedupeForDay(pointsForDay) {
      // If overlap: keep aunt (pink) only
      const best = new Map(); // key -> point
      for (const p of pointsForDay) {
        const k = pointKey(p);
        if (!best.has(k)) best.set(k, p);
        else {
          // prefer aunt if same key
          if (p.who === "aunt") best.set(k, p);
        }
      }
      return Array.from(best.values());
    }

    async function drawPoints(points) {
      clearMarkers();

      const token = ++renderToken;
      const list = points.slice();

      // Add markers as geocodes resolve (so user sees them appearing)
      for (const p of list) {
        if (token !== renderToken) return; // stale render

        try {
          const coords = await geocodePoint(p);
          if (token !== renderToken) return;

          const emoji = CAT_ICON[p.category] || CAT_ICON["Other"];
          const color = markerColor(p);
          const marker = L.marker([coords.lat, coords.lng], { icon: iconEmoji(emoji, color) }).addTo(map);
          marker.options.__pointId = p.id; // internal hook
          marker.bindPopup(buildPopup(p, coords));
          markers.push(marker);
        } catch {
          // Skip marker if geocode fails
        }
      }

      // Fit view after markers appear
      if (token === renderToken) fitToMarkers();
    }

    function applyFilters() {
      const dayPoints = allPoints.filter(p => p.day === activeDay);
      const deduped = dedupeForDay(dayPoints);
      const filtered = searchWithin(deduped, qEl.value);

      showResults(filtered);
      drawPoints(filtered);
    }

    // -----------------------------
    // Near me
    // -----------------------------
    function activateNearMe() {
      if (!navigator.geolocation) {
        alert("Your browser doesn’t support GPS location.");
        return;
      }

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };

          if (userMarker) map.removeLayer(userMarker);
          userMarker = L.circleMarker([userLocation.lat, userLocation.lng], {
            radius: 8,
            weight: 2
          }).addTo(map).bindPopup("<strong>You are here</strong>");

          map.setView([userLocation.lat, userLocation.lng], 14, { animate: true });

          // Refresh UI (distances show if cached; popups updated when reopened)
          applyFilters();
        },
        () => {
          alert("Could not get your location. Please allow location permissions in your browser.");
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    }

    // -----------------------------
    // UI wiring
    // -----------------------------
    document.getElementById("nearBtn").addEventListener("click", activateNearMe);

    document.getElementById("clearBtn").addEventListener("click", () => {
      qEl.value = "";
      userLocation = null;
      if (userMarker) { map.removeLayer(userMarker); userMarker = null; }
      applyFilters();
      qEl.focus();
    });

    qEl.addEventListener("input", applyFilters);

    // -----------------------------
    // Load points.json
    // -----------------------------
    fetch("./points.json")
      .then(r => r.json())
      .then(points => {
        // Add stable IDs (for click handling)
        allPoints = points.map((p, idx) => ({
          id: String(p.id ?? `${idx}`),
          name: p.name,
          day: p.day,
          who: p.who,                 // "aunt" | "me"
          category: p.category || "Other",
          notes: p.notes || "",
          address: p.address || "",
          lat: (typeof p.lat === "number") ? p.lat : undefined,
          lng: (typeof p.lng === "number") ? p.lng : undefined
        }));

        overlapKeys = computeOverlap(allPoints);

        renderTabs();
        applyFilters();
      })
      .catch(err => {
        console.error(err);
        alert("Could not load points.json. Check file name and JSON format.");
      });
  </script>
</body>
</html>
